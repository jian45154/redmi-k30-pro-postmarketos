[core]
backend=drm-backend.so
renderer=pixman
shell=desktop-shell.so
idle-time=0
xwayland=false
require-input=true

[shell]
locking=false
panel-position=top
startup-animation=none
close-animation=none
focus-animation=none
background-color=0xff101820
panel-color=0xff202b38

[keyboard]
keymap_rules=evdev
keymap_model=pc105
keymap_layout=us
repeat-rate=40
repeat-delay=400

[input-method]
path=/usr/libexec/lmi-p2/lmi-weston-osk
overlay-keyboard=false

[output]
name=DSI-1
mode=current
scale=2
transform=normal

[terminal]
font=DejaVu Sans Mono
font-size=18

[launcher]
icon=/usr/share/weston/icon_terminal.png
path=/usr/libexec/lmi-p2/lmi-terminal

[launcher]
icon=/usr/share/weston/icon_editor.png
path=/usr/libexec/lmi-p2/lmi-editor
