# Copy this file to .github/workflows/edge-release-checks.yml when the pushing
# token has GitHub Actions workflow scope.
name: edge release checks

on:
  push:
    branches:
      - edge
  pull_request:
    branches:
      - edge

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run release static checks
        run: scripts/59_release_static_ci.sh
