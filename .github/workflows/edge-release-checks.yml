name: edge release checks

on:
  push:
    branches:
      - master
      - edge
  pull_request:
    branches:
      - master
      - edge

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run release static checks
        run: scripts/59_release_static_ci.sh
