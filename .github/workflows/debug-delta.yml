# Temporary diagnostic workflow — delete after the delta fixture portability
# investigation concludes. Runs the full-delta fixture with bash -x tracing.
name: debug delta fixture

on:
  push:
    branches:
      - agent/lmi-d114-p2-r1-sixrow-release

jobs:
  trace:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install host tools used by test fixtures
        run: sudo apt-get update && sudo apt-get install -y attr

      - name: Trace full-delta fixture
        run: |
          python3 - <<'PY'
          import shutil
          import subprocess
          import tempfile
          from pathlib import Path

          from tests.lmi_p2_d114.test_inject_rootfs_candidate import (
              SCRIPT,
              InjectRootfsCandidateContractTests as T,
          )

          T.setUpClass()
          case = T("test_full_delta_real_tree_fixture_covers_exact_operations_and_parent_links")
          root = Path(tempfile.mkdtemp())
          before, after = root / "before", root / "after"
          case.create_delta_baseline(before)
          shutil.copytree(before, after, symlinks=True)
          case.apply_expected_delta(after)
          body = (
              'snapshot_tree "$2" "$4"\n'
              'echo SNAPSHOT_BEFORE_OK >&2\n'
              'snapshot_tree "$3" "$5"\n'
              'echo SNAPSHOT_AFTER_OK >&2\n'
              'compute_tree_delta "$4" "$5" "$6"\n'
              'echo DELTA_OK >&2\n'
              'cat "$6" >&2\n'
          )
          proc = subprocess.run(
              [
                  "bash",
                  "-xc",
                  'source "$1"\n' + body,
                  "helper-test",
                  str(SCRIPT),
                  str(before),
                  str(after),
                  str(root / "b.inv"),
                  str(root / "a.inv"),
                  str(root / "delta"),
              ],
              capture_output=True,
              text=True,
              check=False,
          )
          print("RC", proc.returncode)
          print("STDOUT:", proc.stdout[-2000:])
          print("TRACE TAIL:")
          print(proc.stderr[-8000:])
          PY
